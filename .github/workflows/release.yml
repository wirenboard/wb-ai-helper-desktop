name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build binaries (linux-x64 + windows-x64)
        run: bun scripts/build.ts --all

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            build/wb-ai-helper-linux-x64 \
            build/wb-ai-helper-windows-x64.exe \
            build/README.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
